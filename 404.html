<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | GOHSY FASHION</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, 'Noto Sans KR', sans-serif;
      background: #0F0F0F;
      color: #F5F5F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .code { font-size: 120px; font-weight: 800; color: #E94560; line-height: 1; }
    .message { font-size: 24px; margin: 20px 0; }
    .sub { color: rgba(245,245,245,0.5); margin-bottom: 30px; }
    .btn {
      background: #E94560;
      color: #F5F5F5;
      padding: 14px 28px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="message">페이지를 찾을 수 없습니다</div>
  <div class="sub">요청하신 상품 또는 페이지가 존재하지 않습니다</div>
  <a href="./showroom/" class="btn">쇼룸으로 가기</a>
</body>
</html>
