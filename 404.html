<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | GOHSY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .code { font-size: 120px; font-weight: 200; color: #333; line-height: 1; letter-spacing: 8px; }
    .message { font-size: 20px; margin: 24px 0 8px; font-weight: 300; }
    .sub { color: #555; margin-bottom: 32px; font-size: 14px; }
    .btn {
      color: #fff;
      padding: 12px 32px;
      border: 1px solid #333;
      text-decoration: none;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: border-color 0.2s;
    }
    .btn:hover { border-color: #888; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="message">페이지를 찾을 수 없습니다</div>
  <div class="sub">GOHSY — wear the story</div>
  <a href="/" class="btn">쇼룸으로</a>
</body>
</html>
