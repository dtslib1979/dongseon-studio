<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" class="gohsy-logo">
  <defs>
    <style>
      @keyframes wheel-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .wheel-spokes { transform-origin: 174px 56px; animation: wheel-spin 20s linear infinite; }
      .throne-glow { filter: drop-shadow(0 0 6px rgba(46,125,82,0.3)); }
    </style>
  </defs>

  <!-- G — Forward momentum -->
  <g transform="translate(0,0)">
    <path d="M72 16C52 16 36 32 36 56C36 80 52 96 72 96C88 96 100 86 104 72H76V64H116V72C112 92 94 108 72 108C44 108 22 86 22 56C22 26 44 4 72 4C92 4 108 16 114 34L102 38C98 24 86 16 72 16Z"
          fill="currentColor" opacity="0.95"/>
  </g>

  <!-- O — The Wheel (마차 바퀴) -->
  <g transform="translate(120,0)">
    <circle cx="54" cy="56" r="52" stroke="currentColor" stroke-width="4" fill="none" opacity="0.95"/>
    <circle cx="54" cy="56" r="47" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.25"/>
    <circle cx="54" cy="56" r="10" fill="#2E7D52"/>
    <circle cx="54" cy="56" r="6" stroke="currentColor" stroke-width="1" fill="none" opacity="0.4"/>
    <circle cx="54" cy="56" r="2.5" fill="currentColor" opacity="0.7"/>
    <circle cx="54" cy="56" r="20" stroke="currentColor" stroke-width="1.5" fill="none" opacity="0.18"/>
    <circle cx="54" cy="56" r="36" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.1" stroke-dasharray="8 9"/>
    <g class="wheel-spokes" style="transform-origin:174px 56px">
      <line x1="54" y1="8" x2="54" y2="36" stroke="currentColor" stroke-width="2.2" opacity="0.45"/>
      <line x1="54" y1="76" x2="54" y2="104" stroke="currentColor" stroke-width="2.2" opacity="0.45"/>
      <line x1="6" y1="56" x2="34" y2="56" stroke="currentColor" stroke-width="2.2" opacity="0.45"/>
      <line x1="74" y1="56" x2="102" y2="56" stroke="currentColor" stroke-width="2.2" opacity="0.45"/>
      <line x1="20" y1="22" x2="40" y2="42" stroke="currentColor" stroke-width="1.6" opacity="0.3"/>
      <line x1="68" y1="70" x2="88" y2="90" stroke="currentColor" stroke-width="1.6" opacity="0.3"/>
      <line x1="88" y1="22" x2="68" y2="42" stroke="currentColor" stroke-width="1.6" opacity="0.3"/>
      <line x1="40" y1="70" x2="20" y2="90" stroke="currentColor" stroke-width="1.6" opacity="0.3"/>
      <line x1="30" y1="12" x2="42" y2="36" stroke="currentColor" stroke-width="1" opacity="0.18"/>
      <line x1="66" y1="76" x2="78" y2="100" stroke="currentColor" stroke-width="1" opacity="0.18"/>
      <line x1="78" y1="12" x2="66" y2="36" stroke="currentColor" stroke-width="1" opacity="0.18"/>
      <line x1="42" y1="76" x2="30" y2="100" stroke="currentColor" stroke-width="1" opacity="0.18"/>
    </g>
  </g>

  <!-- H — The Throne (중세 왕좌) -->
  <g transform="translate(240,0)" class="throne-glow">
    <rect x="14" y="6" width="8" height="100" rx="2" fill="currentColor" opacity="0.95"/>
    <rect x="82" y="6" width="8" height="100" rx="2" fill="currentColor" opacity="0.95"/>
    <rect x="10" y="98" width="16" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
    <rect x="78" y="98" width="16" height="6" rx="1.5" fill="currentColor" opacity="0.5"/>
    <path d="M22 6 L22 34 Q22 14 52 4 Q82 14 82 34 L82 6" stroke="currentColor" stroke-width="1.2" fill="none" opacity="0.12"/>
    <path d="M30 6 L30 30 Q30 16 52 8 Q74 16 74 30 L74 6" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.08"/>
    <line x1="40" y1="10" x2="40" y2="44" stroke="currentColor" stroke-width="0.8" opacity="0.1"/>
    <line x1="52" y1="6" x2="52" y2="44" stroke="currentColor" stroke-width="0.8" opacity="0.12"/>
    <line x1="64" y1="10" x2="64" y2="44" stroke="currentColor" stroke-width="0.8" opacity="0.1"/>
    <rect x="8" y="48" width="88" height="10" rx="3" fill="#2E7D52"/>
    <path d="M14 48 Q52 42 90 48" stroke="#3A9966" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M8 48 C2 48 -2 44 -2 38 Q-2 32 2 30" stroke="#2E7D52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="2" cy="29" r="2" fill="#2E7D52"/>
    <path d="M96 48 C102 48 106 44 106 38 Q106 32 102 30" stroke="#2E7D52" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <circle cx="102" cy="29" r="2" fill="#2E7D52"/>
    <path d="M18 6 L18 -2 Q14 -6 12 -10" stroke="#2E7D52" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M18 -2 Q22 -6 24 -10" stroke="#2E7D52" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="-4" r="1.5" fill="#2E7D52"/>
    <circle cx="12" cy="-11" r="1.2" fill="#2E7D52"/>
    <circle cx="24" cy="-11" r="1.2" fill="#2E7D52"/>
    <path d="M86 6 L86 -2 Q82 -6 80 -10" stroke="#2E7D52" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M86 -2 Q90 -6 92 -10" stroke="#2E7D52" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <circle cx="86" cy="-4" r="1.5" fill="#2E7D52"/>
    <circle cx="80" cy="-11" r="1.2" fill="#2E7D52"/>
    <circle cx="92" cy="-11" r="1.2" fill="#2E7D52"/>
    <rect x="20" y="104" width="64" height="3" rx="1.5" fill="currentColor" opacity="0.2"/>
  </g>

  <!-- S — Elegant, thin weight -->
  <g transform="translate(358,0)">
    <path d="M68 24C68 12 56 4 42 4C28 4 16 12 16 26C16 40 28 44 42 48C56 52 68 56 68 70C68 84 56 96 42 96C26 96 14 86 14 72"
          stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Y — Light, adjective suffix -->
  <g transform="translate(434,0)">
    <path d="M8 4L44 60V96" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <path d="M80 4L44 60" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>
</svg>
